<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Video Container - Full Screen */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 1;
        }

        /* Streamable Embed */
        .video-container > div {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* Block Overlay (prevents all interaction) */
        .block-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: default;
        }

        /* Transition Overlay */
        .transition-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .transition-overlay.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Video Container -->
    <div class="video-container">
        <div style="position:relative; width:100%; height:100%;">
            <iframe 
                id="videoFrame"
                allow="fullscreen;autoplay" 
                allowfullscreen 
                src="https://streamable.com/e/6am8zq?autoplay=1&loop=0&nocontrols=1" 
                style="border:none; width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden;">
            </iframe>
        </div>
    </div>

    <!-- Block All Interactions -->
    <div class="block-overlay"></div>

    <!-- Transition Overlay -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <script>
        // ============================================
        // ضع مدة الفيديو الكاملة بالثواني هنا
        // ============================================
        const VIDEO_DURATION_SECONDS = 15; // مثال: إذا كان الفيديو 15 ثانية
        
        // نطرح 8 ثواني للدخول قبل النهاية
        const ENTER_BEFORE_END = 8; 
        
        const ACTUAL_ENTER_TIME = (VIDEO_DURATION_SECONDS - ENTER_BEFORE_END) * 1000;
        
        let entered = false;

        // Auto-enter before video ends (8 seconds earlier)
        setTimeout(() => {
            enterSite();
        }, ACTUAL_ENTER_TIME);

        // Enter site function
        function enterSite() {
            if (entered) return;
            entered = true;
            
            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.add('active');
            
            setTimeout(() => {
                // ============================================
                // الرابط الجديد هنا
                // ============================================
                window.location.href = 'https://eternal-site-spark.lovable.app/';
            }, 800);
        }

        // Prevent right-click
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });

        // Prevent keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
