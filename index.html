<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREM CHAT - AI Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&family=Orbitron:wght@700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0520;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
        }
        
        /* Video Intro - أبيض */
        #video-intro {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            overflow: hidden;
        }
        
        #video-intro.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        /* Video wrapper */
        .video-wrapper {
            position: relative;
            width: 50%;
            max-width: 400px;
            height: 0;
            padding-bottom: 74.138%;
            pointer-events: none;
            user-select: none;
            overflow: hidden;
            z-index: 10;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        
        /* طبقة لمنع أي تفاعل مع الفيديو */
        .video-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            pointer-events: all;
            z-index: 20;
        }
        
        /* App Container */
        #app {
            position: fixed;
            inset: 0;
            background: #0a0520;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 100;
        }
        
        #app.show {
            opacity: 1;
        }
        
        #app iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Video Intro Screen - أبيض -->
    <div id="video-intro">
        <div class="video-wrapper">
            <div style="position:relative; width:100%; height:0px; padding-bottom:148.276%">
                <iframe allow="autoplay; fullscreen" allowfullscreen height="100%" src="https://streamable.com/e/w14f4q?autoplay=1&muted=1&nocontrols=1" width="100%" style="border:none; width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden; pointer-events: none;"></iframe>
            </div>
        </div>
    </div>

    <!-- Application -->
    <div id="app">
        <iframe src="https://myapp.codeflying.app/1401277/pagesA/main_chat/index" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('video-intro').classList.add('hide');
            document.getElementById('app').classList.add('show');
        }, 6000);
    </script>

</body>
</html>
