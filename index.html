        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap');
        :root { --primary: #ff00cc; }

        .hero-bg { background: linear-gradient(135deg, #6b00ff 0%, #ff00cc 100%); animation: gradientShift 15s ease infinite; }

        .card-hover { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .card-hover:hover { transform: scale(1.08) rotate(2deg); box-shadow: 0 25px 50px -12px rgb(249 115 22); }
        .confetti { position: absolute; width: 10px; height: 10px; animation: confetti-fall 4s linear infinite; }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 3px; bottom: -2px; left: 0; background-color: #fff; transition: all 0.3s; }
        .nav-link:hover:after { width: 100%; }
        .product-badge { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        .buy-btn { animation: pulse 2s infinite; }
